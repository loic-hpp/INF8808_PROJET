services:
  - type: web
    name: projet_inf8808_gestion_demande_energie_en_hiver_hydro_qc
    runtime: python
    pythonVersion: "3.10"
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 10000   # Render assigns its own port; HTTPS/443 is handled automatically